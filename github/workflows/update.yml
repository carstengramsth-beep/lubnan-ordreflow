name: Update Ordreflow

on:
  workflow_dispatch:
    inputs:
      content:
        description: 'HTML content'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update file
        run: echo "${{ github.event.inputs.content }}" > index.html
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html
          git commit -m "Auto update"
          git push
